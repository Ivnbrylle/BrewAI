services:
  postgres:
    image: postgres:16-alpine
    container_name: brewai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brewai
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: brewai-qdrant
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama:latest
    container_name: brewai-ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: brewai-backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: brewai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: